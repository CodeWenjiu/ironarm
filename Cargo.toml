[workspace]
members = ["ironarm_cli", "ironarm_core", "ironarm_sim"]
resolver = "2"

[workspace.dependencies]
cu29 = { git = "https://github.com/copper-project/copper-rs.git", branch = "master" }
cu-consolemon = { git = "https://github.com/copper-project/copper-rs.git", branch = "master" }
bincode = { package = "cu-bincode", version = "2.0", default-features = false, features = ["derive", "alloc"] }
serde = { version = "1.0", features = ["derive"] }
bevy = { version = "0.18.0", default-features = false, features = [
  "x11",
  "default_font",
  "bevy_render",
  "bevy_window",
  "bevy_core_pipeline",
  "bevy_pbr",
  "bevy_scene",
  "bevy_sprite",
  "bevy_gltf",
  "gltf_animation",
  "tonemapping_luts",
  "bevy_ui",
  "bevy_ui_render",
  "ktx2",
  "jpeg",
  "png",
  "zstd_rust",
  "trace",
  "reflect_auto_register",
] }
